publish:
  - "github"
productName: "Exiled Exchange 2"
npmRebuild: false
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js"]
  - from: "../renderer/dist"
    to: "."
  - "node_modules/dbus-next/**"
extraMetadata:
  main: "main.js"

linux:
  target:
    - "AppImage"
  extraFiles:
    - from: "build/linux-bin"
      to: "bin"
      filter:
        - "**/*"

appImage:
  executableArgs:
    - "--sandbox"
    - "--ozone-platform-hint=auto"
    - "--enable-features=UseOzonePlatform,WaylandWindowDecorations"
